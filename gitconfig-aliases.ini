[user]
    email = iamantoniodinuzzo@gmail.com
    name = Antonio

[alias]
    # Usage: git start <type> <name>
    # types: feature, bugfix, release, hotfix, support
    start = "!f() { \
        TYPE=$1; NAME=$2; \
        if [ \"$TYPE\" = \"hotfix\" ] || [ \"$TYPE\" = \"support\" ]; then \
            BASE=main; \
        else \
            BASE=develop; \
        fi; \
        git checkout $BASE && git pull origin $BASE && \
        git checkout -b $TYPE/$NAME && \
        echo \"✅ Branch $TYPE/$NAME creato da $BASE\"; \
    }; f"

    # Genera messaggio di commit con AI
    c       = "!bash ~/.git-scripts/git-commit.sh"

    # Genera messaggio con AI e mergia
    finish  = "!bash ~/.git-scripts/git-finish.sh"

    # Pusha il branch corrente
    publish = "!git push origin $(git symbolic-ref --short HEAD) && echo '🚀 Pubblicato'"

    # Mostra branch flow attivi
    st-flow = "!git branch | grep -E '(feature|bugfix|release|hotfix|support)/'"

    # Sync su develop
    sync    = "!git checkout develop && git pull origin develop"
