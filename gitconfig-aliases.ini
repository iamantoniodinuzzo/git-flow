[user]
    name  = Your Name
    email = you@example.com
    
[alias]
    # ─── Setup ────────────────────────────────────────────────────
    # Initialize git flow on a repo starting from main
    init-flow = "!f() { \
        git checkout main && \
        git checkout -b develop && \
        git push -u origin develop && \
        echo \"✅ Branch develop created and pushed to origin\"; \
    }; f"

    # ─── Branch lifecycle ─────────────────────────────────────────
    # Usage: git start <type> <name>
    start = "!f() { \
        TYPE=\"$1\"; NAME=\"$2\"; \
        if [ -z \"$NAME\" ]; then \
            echo \"❌ Usage: git start <type> <name>\"; \
            echo \"   Example: git start release 1.2.0\"; \
            exit 1; \
        fi; \
        if [ \"$TYPE\" = \"hotfix\" ] || [ \"$TYPE\" = \"support\" ]; then \
            BASE=\"main\"; \
        else \
            BASE=\"develop\"; \
        fi; \
        if [ \"$TYPE\" != \"support\" ] && ! git show-ref --verify --quiet refs/heads/develop; then \
            echo \"❌ Branch 'develop' does not exist. Run first: git init-flow\"; \
            exit 1; \
        fi; \
        git checkout \"$BASE\" && git pull origin \"$BASE\" && \
        git checkout -b \"$TYPE/$NAME\" && \
        echo \"✅ Branch $TYPE/$NAME created from $BASE\"; \
    }; f"

    # Generate commit message with AI (using staged files)
    c       = "!bash ~/.git-scripts/git-commit.sh"

    # Generate merge message with AI and close the branch
    finish  = "!bash ~/.git-scripts/git-finish.sh"

    # ─── Utility ──────────────────────────────────────────────────
    # Push current branch to origin
    publish = "!git push origin $(git symbolic-ref --short HEAD) && echo '🚀 Published'"

    # Show all active flow branches
    st-flow = "!git branch | grep -E '(feature|bugfix|release|hotfix|support)/' || true"

    # Checkout develop + pull
    sync    = "!git checkout develop && git pull origin develop"
