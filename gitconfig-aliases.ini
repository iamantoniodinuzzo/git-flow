[alias]
    # ─── Setup ────────────────────────────────────────────────────
    # Inizializza git flow su un repo che parte da main
    init-flow = "!f() { \
        git checkout main && \
        git checkout -b develop && \
        git push -u origin develop && \
        echo \"✅ Branch develop creato e pushato su origin\"; \
    }; f"

    # ─── Branch lifecycle ─────────────────────────────────────────
    # Usage: git start <type> <issue_number_description>
    # types: feature, bugfix, release, hotfix, support
    start = "!f() { \
        TYPE=$1; NAME=$2; \
        if [ \"$TYPE\" = \"hotfix\" ] || [ \"$TYPE\" = \"support\" ]; then \
            BASE=main; \
        else \
            BASE=develop; \
        fi; \
        if [ \"$TYPE\" != \"support\" ] && ! git show-ref --verify --quiet refs/heads/develop; then \
            echo \"❌ Branch 'develop' non esiste. Esegui prima: git init-flow\"; \
            exit 1; \
        fi; \
        git checkout $BASE && git pull origin $BASE && \
        git checkout -b $TYPE/$NAME && \
        echo \"✅ Branch $TYPE/$NAME creato da $BASE\"; \
    }; f"

    # Genera messaggio di commit con AI (usa i file in staging)
    c       = "!bash ~/.git-scripts/git-commit.sh"

    # Genera messaggio di merge con AI e chiude il branch
    finish  = "!bash ~/.git-scripts/git-finish.sh"

    # ─── Utility ──────────────────────────────────────────────────
    # Pusha il branch corrente su origin
    publish = "!git push origin $(git symbolic-ref --short HEAD) && echo '🚀 Pubblicato'"

    # Mostra tutti i branch flow attivi
    st-flow = "!git branch | grep -E '(feature|bugfix|release|hotfix|support)/'"

    # Checkout develop + pull
    sync    = "!git checkout develop && git pull origin develop"
